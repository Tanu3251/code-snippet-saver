<!DOCTYPE html>
<html>
<head>
<title>Code Snippet Saver</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

.container{
margin-top:50px;
}

h1{
color:#333;
}

.box{
background:white;
width:320px;
margin:20px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
transition:0.3s;
}

.box:hover{
transform:scale(1.05);
}

a{
display:block;
background:#4CAF50;
color:white;
padding:10px;
margin:10px;
text-decoration:none;
border-radius:5px;
}

a:hover{
background:#2e7d32;
}

</style>
</head>

<body>

<div class="container">

<h1>Code Snippet Saver</h1>

<p>Browse reusable programming snippets stored using Git version control.</p>

<div class="box">

<h2>Python Snippets</h2>

<a href="https://github.com/Tanu3251/code-snippet-saver/blob/main/python/bubble_sort.py" target="_blank">
Bubble Sort
</a>

<a href="https://github.com/Tanu3251/code-snippet-saver/blob/main/python/binary_search.py" target="_blank">
Binary Search
</a>

</div>

<div class="box">

<h2>C Snippets</h2>

<a href="https://github.com/Tanu3251/code-snippet-saver/blob/main/python/c/factorial.c" target="_blank">
Factorial
</a>

</div>

</div>

</body>
</html>
